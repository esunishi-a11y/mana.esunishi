<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マナ・サイクル・コロシアム - Ver 1.2</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; color: #fff; user-select: none; }
        #login-screen { color: #33ff33; text-shadow: 0 0 5px #33ff33; padding: 30px; max-width: 600px; margin: 50px auto; border: 2px solid #33ff33; background: #051505; box-shadow: 0 0 20px rgba(51, 255, 51, 0.2); }
        #login-screen h1 { text-align: center; border-bottom: 1px dashed #33ff33; padding-bottom: 10px; }
        .input-group { margin: 20px 0; }
        input[type="text"] { background: #000; color: #33ff33; border: 1px solid #33ff33; padding: 8px; font-family: inherit; width: calc(100% - 20px); font-size: 16px; }
        button { background: #000; color: #33ff33; border: 1px solid #33ff33; padding: 10px 20px; font-family: inherit; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; width: 100%; margin-bottom: 10px; }
        button:hover:not(:disabled) { background: #33ff33; color: #000; }
        button:disabled { border-color: #555; color: #555; cursor: not-allowed; text-shadow: none; }
        #connection-log { margin-top: 20px; height: 120px; overflow-y: auto; font-size: 14px; border-top: 1px dashed #33ff33; padding-top: 10px; }
        #game-screen { display: none; width: 100vw; height: 100vh; position: relative; }
        #game-canvas { display: block; }
        #ui-panel { position: absolute; right: 0; top: 0; width: 300px; height: 100%; background: rgba(10, 5, 0, 0.9); border-left: 2px solid #5c4033; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.8); }
        #ui-panel h3 { margin: 0; padding: 15px; font-size: 18px; color: #e6c200; border-bottom: 1px solid #5c4033; background: rgba(0,0,0,0.5); }
        #lobby-controls { padding: 15px; border-bottom: 1px solid #5c4033; }
        .list-container { flex: 1; overflow-y: auto; padding: 10px; margin: 0; list-style: none; }
        #leaderboard li { margin-bottom: 8px; font-size: 16px; color: #ddd; }
        #leaderboard .my-score { color: #f1c40f; font-weight: bold; text-shadow: 0 0 5px #f1c40f; }
        #action-log { border-top: 2px solid #5c4033; flex: 1.5; }
        #action-log li { margin-bottom: 6px; font-size: 13px; color: #aaa; line-height: 1.4; border-bottom: 1px solid #222; padding-bottom: 2px; }
        #action-log li .turn-header { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1>マナ・サイクル・コロシアム</h1>
    <div id="connection-log">
        <div>> SYSTEM: BOOT SEQUENCE...</div>
    </div>
    <div class="input-group">
        <div>> ENTER USERNAME:</div>
        <input type="text" id="username" value="Player">
    </div>
    <button id="btn-host" disabled>部屋を作る</button>
    <div class="input-group" style="margin-top: 20px;">
        <div>> JOIN ROOM ID:</div>
        <input type="text" id="room-id" placeholder="EX: A1B2C3">
    </div>
    <button id="btn-join" disabled>部屋に入る</button>
</div>

<div id="game-screen">
    <canvas id="game-canvas"></canvas>
    <div id="ui-panel">
        <div id="lobby-controls" style="display: none;">
            <div style="color: #2ecc71; font-weight: bold; margin-bottom: 5px;">> LOBBY STAGE</div>
            <div style="margin-bottom: 10px;">ROOM ID: <span id="display-room-id" style="color:#f1c40f; font-size:18px;"></span></div>
            <button id="btn-start-game">ゲーム開始</button>
        </div>
        <h3>🏆 順位表</h3>
        <ul id="leaderboard" class="list-container"></ul>
        <h3>📜 アクションログ</h3>
        <ul id="action-log" class="list-container"></ul>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

// --- Config (Placeholder) ---
const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const appId = typeof __app_id !== 'undefined' ? __app_id : 'mana-cycle-col';

let myId = '';
let isHost = false;
let roomRef = null;
let currentRoomId = '';
let localLogCount = 0;
let gameState = null;
let players = [];
let myHand = [];
let myState = 'SELECTING';
let currentRound = 0;
let lastRound = 0;
let lastResolveId = null;

function logCLI(msg) {
    const el = document.getElementById('connection-log');
    const div = document.createElement('div');
    div.innerHTML = '> ' + msg;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
}

// 認証完了まで待機
onAuthStateChanged(auth, (user) => {
    if (user) {
        myId = user.uid;
        logCLI(`SYSTEM: AUTHENTICATED [${myId.substring(0,6)}]`);
        document.getElementById('btn-host').disabled = false;
        document.getElementById('btn-join').disabled = false;
    } else {
        signInAnonymously(auth).catch(e => logCLI(`ERROR: ${e.message}`));
    }
});

// --- カードデータ ---
const CARDS = [
    { id: 'c1', name: "Knight's Strike", type: "ATK", color: "#e74c3c", desc: "ランダムな相手から200pt奪う" },
    { id: 'c2', name: "Holy Barrier", type: "DEF", color: "#3498db", desc: "ターン内の減少を防ぐ" },
    { id: 'c3', name: "Mage's Transfer", type: "MAG", color: "#9b59b6", desc: "ランダムな相手とスコア平均化" },
    { id: 'c4', name: "Mana Drain", type: "MAG", color: "#8e44ad", desc: "全員から50ptずつ吸収" },
    { id: 'c5', name: "Quick Slash", type: "ATK", color: "#c0392b", desc: "右隣のプレイヤーから300pt奪う" }
];

const CARD_EFFECTS = {
    'c1': (u, ps, logs, parts) => {
        let targets = ps.filter(p => p.id !== u.id);
        if(targets.length > 0){
            let t = targets[Math.floor(Math.random() * targets.length)];
            if(t.isDefending) logs.push(`${u.name}の攻撃! ${t.name}に防がれた!`);
            else { t.score -= 200; u.score += 200; logs.push(`${u.name}は${t.name}から200pt奪った!`); parts.push({from: t.id, to: u.id, color: '#e74c3c'}); }
        }
    },
    'c3': (u, ps, logs, parts) => {
        let targets = ps.filter(p => p.id !== u.id);
        if(targets.length > 0){
            let t = targets[Math.floor(Math.random() * targets.length)];
            if(t.isDefending) logs.push(`${u.name}の魔術! ${t.name}は防御中。`);
            else { let avg = Math.floor((u.score + t.score) / 2); u.score = avg; t.score = avg; logs.push(`${u.name}と${t.name}が同調した。`); parts.push({from: u.id, to: t.id, color: '#9b59b6'}); }
        }
    },
    'c4': (u, ps, logs, parts) => {
        let total = 0;
        ps.forEach(p => { if(p.id !== u.id && !p.isDefending){ p.score -= 50; total += 50; parts.push({from: p.id, to: u.id, color: '#8e44ad'}); }});
        u.score += total; logs.push(`${u.name}は全員から${total}pt吸収した!`);
    },
    'c5': (u, ps, logs, parts) => {
        let idx = ps.findIndex(p => p.id === u.id);
        let t = ps[(idx + 1) % ps.length];
        if(t && t.id !== u.id){
            if(t.isDefending) logs.push(`${u.name}の斬撃! ${t.name}は防御した。`);
            else { t.score -= 300; u.score += 300; logs.push(`${u.name}は右隣の${t.name}から300pt奪った!`); parts.push({from: t.id, to: u.id, color: '#c0392b'}); }
        }
    }
};

// --- 通信ロジック ---
async function setupRoom(roomId, asHost) {
    currentRoomId = roomId;
    isHost = asHost;
    roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'mana_cycle_rooms', roomId);
    
    const snap = await getDoc(roomRef);
    const name = document.getElementById('username').value || 'Unknown';

    if (asHost) {
        await setDoc(roomRef, {
            hostId: myId, phase: 'LOBBY', currentRound: 0,
            players: { [myId]: { name, score: 1000, isDefending: false } },
            playerStatus: { [myId]: 'lobby' },
            playerCard: { [myId]: null },
            hands: {}, logs: [`<span class="turn-header">WELCOME TO ${roomId}</span>`], resolveId: 'init'
        });
    } else {
        if (!snap.exists()) { alert("部屋が見つかりません"); return; }
        // 既存プレイヤーなら上書きせず復帰、新規なら追加
        const data = snap.data();
        if (!data.players[myId]) {
            await updateDoc(roomRef, {
                [`players.${myId}`]: { name, score: 1000, isDefending: false },
                [`playerStatus.${myId}`]: data.phase === 'LOBBY' ? 'lobby' : 'thinking'
            });
        }
    }

    listenToRoom();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    if(isHost) document.getElementById('lobby-controls').style.display = 'block';
    document.getElementById('display-room-id').innerText = roomId;
    resizeCanvas();
    requestAnimationFrame(gameLoop);
}

function listenToRoom() {
    onSnapshot(roomRef, (snap) => {
        if (!snap.exists()) return;
        gameState = snap.data();
        currentRound = gameState.currentRound;

        // プレイヤー配列の構築
        players = Object.keys(gameState.players).map(id => ({
            id, ...gameState.players[id],
            status: gameState.playerStatus[id],
            playedCardId: gameState.playerCard[id]
        }));

        // 手札の同期
        if (gameState.hands && gameState.hands[myId]) {
            myHand = gameState.hands[myId].map(cid => CARDS.find(c => c.id === cid)).filter(Boolean);
        }

        // アクションログの同期（差分のみ追加）
        if (gameState.logs && gameState.logs.length > localLogCount) {
            for (let i = localLogCount; i < gameState.logs.length; i++) {
                addActionLog(gameState.logs[i]);
            }
            localLogCount = gameState.logs.length;
        }

        // エフェクト演出
        if (gameState.resolveId && gameState.resolveId !== lastResolveId) {
            lastResolveId = gameState.resolveId;
            if (gameState.lastParticles) {
                gameState.lastParticles.forEach(p => spawnParticle(p));
            }
        }

        // ラウンド開始検知
        if (currentRound > lastRound && gameState.phase === 'PLAYING') {
            lastRound = currentRound;
            myState = 'SELECTING';
            selectedCardIndex = -1;
        }

        updateLeaderboard();
        calculatePositions();

        // ホスト：全員準備完了チェック
        if (isHost && gameState.phase === 'PLAYING') {
            const activePlayers = players.filter(p => p.status !== 'away');
            if (activePlayers.length > 0 && activePlayers.every(p => p.status === 'ready')) {
                resolveRound();
            }
        }
    });
}

function addActionLog(msg) {
    const list = document.getElementById('action-log');
    let li = document.createElement('li');
    li.innerHTML = msg;
    list.appendChild(li);
    list.scrollTop = list.scrollHeight;
}

// --- ホスト処理: ラウンド解決 ---
async function startRound() {
    let nextRound = gameState.currentRound + 1;
    let updates = {
        phase: 'PLAYING', currentRound: nextRound,
        logs: arrayUnion(`<span class="turn-header">--- ROUND ${nextRound} START ---</span>`),
        lastParticles: []
    };
    players.forEach(p => {
        updates[`playerStatus.${p.id}`] = 'thinking';
        updates[`playerCard.${p.id}`] = null;
        updates[`players.${p.id}.isDefending`] = false;
        updates[`hands.${p.id}`] = Array(5).fill(0).map(() => CARDS[Math.floor(Math.random()*CARDS.length)].id);
    });
    await updateDoc(roomRef, updates);
}

async function resolveRound() {
    await updateDoc(roomRef, { phase: 'RESOLVING' });
    let newLogs = [];
    let newParts = [];
    let pData = JSON.parse(JSON.stringify(players));

    // 1. 防御
    pData.forEach(p => {
        if(p.playedCardId === 'c2') {
            p.isDefending = true;
            newLogs.push(`🛡️ ${p.name}は防御した`);
            newParts.push({from: p.id, to: p.id, color: '#00ffff', type: 'shield'});
        }
    });

    // 2. 攻撃・魔術
    pData.forEach(p => {
        if(p.playedCardId && p.playedCardId !== 'c2') {
            const fx = CARD_EFFECTS[p.playedCardId];
            if(fx) fx(p, pData, newLogs, newParts);
        }
    });

    let updates = {
        logs: arrayUnion(...newLogs),
        lastParticles: newParts,
        resolveId: Date.now().toString()
    };
    pData.forEach(p => {
        updates[`players.${p.id}.score`] = p.score;
        updates[`players.${p.id}.isDefending`] = p.isDefending;
    });

    await updateDoc(roomRef, updates);

    setTimeout(() => {
        if (currentRound >= 10) updateDoc(roomRef, { phase: 'RESULT' });
        else startRound();
    }, 4000);
}

// --- ボタンイベント ---
document.getElementById('btn-host').onclick = () => setupRoom(Math.random().toString(36).substr(2,6).toUpperCase(), true);
document.getElementById('btn-join').onclick = () => {
    const id = document.getElementById('room-id').value.toUpperCase();
    if(id) setupRoom(id, false);
};
document.getElementById('btn-start-game').onclick = () => { if(isHost) startRound(); };

// --- Canvas描画ロジック ---
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let playerPositions = {};
let activeParticles = [];
let selectedCardIndex = -1;
let hoveredCardIndex = -1;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    calculatePositions();
}
window.addEventListener('resize', resizeCanvas);

function calculatePositions() {
    if(!players.length) return;
    const gameW = canvas.width - 300;
    const cx = gameW / 2;
    const cy = canvas.height / 2 - 40;
    const r = Math.min(gameW, canvas.height) * 0.3;
    players.forEach((p, i) => {
        const ang = -Math.PI/2 + (Math.PI*2/players.length)*i;
        playerPositions[p.id] = { x: cx + r*Math.cos(ang), y: cy + r*Math.sin(ang) };
    });
}

function spawnParticle(p) {
    const from = playerPositions[p.from];
    const to = playerPositions[p.to];
    if(!from || !to) return;
    activeParticles.push({ ...p, startX: from.x, startY: from.y, targetX: to.x, targetY: to.y, progress: 0 });
}

function gameLoop() {
    const gameW = canvas.width - 300;
    ctx.fillStyle = '#0a0500';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if(!gameState) { requestAnimationFrame(gameLoop); return; }

    // プレイヤー描画
    players.forEach(p => {
        const pos = playerPositions[p.id];
        if(!pos) return;
        ctx.fillStyle = p.status === 'ready' ? '#2ecc71' : (p.id === myId ? '#3498db' : '#7f8c8d');
        ctx.beginPath(); ctx.arc(pos.x, pos.y, 15, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '14px Arial';
        ctx.fillText(p.name, pos.x, pos.y - 25);
        ctx.fillStyle = '#f1c40f'; ctx.fillText(p.score + 'pt', pos.x, pos.y + 35);
    });

    // 手札描画
    if(gameState.phase === 'PLAYING') {
        const cardW = 100, cardH = 140, margin = 10;
        const startX = gameW/2 - (cardW*5+margin*4)/2;
        myHand.forEach((c, i) => {
            const x = startX + i*(cardW+margin);
            const y = canvas.height - 160 + (selectedCardIndex === i ? -20 : 0);
            ctx.fillStyle = '#1a1a1a'; ctx.strokeStyle = c.color; ctx.lineWidth = (hoveredCardIndex === i ? 4 : 2);
            ctx.fillRect(x, y, cardW, cardH); ctx.strokeRect(x, y, cardW, cardH);
            ctx.fillStyle = c.color; ctx.font = 'bold 12px Arial'; ctx.fillText(c.type, x + cardW/2, y + 20);
            ctx.fillStyle = '#fff'; ctx.font = '11px Arial'; ctx.fillText(c.name, x + cardW/2, y + 50);
        });
        if(selectedCardIndex !== -1 && myState === 'SELECTING') {
            ctx.fillStyle = '#d35400'; ctx.fillRect(gameW/2-60, canvas.height-220, 120, 30);
            ctx.fillStyle = '#fff'; ctx.fillText("決定", gameW/2, canvas.height-200);
        }
    }

    // エフェクト描画
    for(let i=activeParticles.length-1; i>=0; i--){
        let p = activeParticles[i]; p.progress += 0.02;
        if(p.progress >= 1) { activeParticles.splice(i,1); continue; }
        let cx = p.startX + (p.targetX-p.startX)*p.progress;
        let cy = p.startY + (p.targetY-p.startY)*p.progress;
        ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2); ctx.fill();
    }

    if(gameState.phase === 'RESULT') {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,gameW,canvas.height);
        ctx.fillStyle = '#f1c40f'; ctx.font = '40px Arial'; ctx.fillText("GAME OVER", gameW/2, canvas.height/2);
    }

    requestAnimationFrame(gameLoop);
}

function updateLeaderboard() {
    const list = document.getElementById('leaderboard');
    list.innerHTML = '';
    [...players].sort((a,b)=>b.score-a.score).forEach((p, i) => {
        let li = document.createElement('li');
        if(p.id === myId) li.className = 'my-score';
        li.innerText = `${i+1}. ${p.name}: ${p.score}pt ${p.status === 'ready' ? '✓' : ''}`;
        list.appendChild(li);
    });
}

canvas.addEventListener('mousemove', e => {
    const gameW = canvas.width - 300;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    hoveredCardIndex = -1;
    if(my > canvas.height - 180 && mx < gameW) {
        const cardW = 110;
        const startX = gameW/2 - (cardW*5)/2;
        const idx = Math.floor((mx - startX) / cardW);
        if(idx >= 0 && idx < 5) hoveredCardIndex = idx;
    }
});

canvas.addEventListener('click', async e => {
    if(myState !== 'SELECTING') return;
    const gameW = canvas.width - 300;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    
    if(hoveredCardIndex !== -1) selectedCardIndex = hoveredCardIndex;
    
    // 決定ボタンクリック
    if(selectedCardIndex !== -1 && mx > gameW/2-60 && mx < gameW/2+60 && my > canvas.height-220 && my < canvas.height-190) {
        myState = 'WAITING';
        await updateDoc(roomRef, {
            [`playerStatus.${myId}`]: 'ready',
            [`playerCard.${myId}`]: myHand[selectedCardIndex].id
        });
    }
});
</script>
</body>
</html>
