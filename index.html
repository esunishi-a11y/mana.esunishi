<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マナ・サイクル・コロシアム - P2P Edition</title>
    <!-- PeerJS for WebRTC connectivity -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0500;
            --accent-gold: #e6c200;
            --terminal-green: #33ff33;
            --panel-bg: rgba(20, 10, 5, 0.95);
            --border-color: #5c4033;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: var(--bg-color);
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            user-select: none;
        }

        /* Login Screen Styles */
        #login-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1a1005 0%, #000 100%);
            z-index: 100;
        }

        .login-box {
            background: #051505;
            border: 2px solid var(--terminal-green);
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 30px rgba(51, 255, 51, 0.15);
            color: var(--terminal-green);
        }

        .login-box h1 {
            text-align: center;
            margin-top: 0;
            font-size: 24px;
            border-bottom: 1px dashed var(--terminal-green);
            padding-bottom: 15px;
        }

        .input-group { margin: 25px 0; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; }

        input[type="text"] {
            background: #000;
            color: var(--terminal-green);
            border: 1px solid var(--terminal-green);
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 18px;
            outline: none;
        }

        button {
            background: #000;
            color: var(--terminal-green);
            border: 1px solid var(--terminal-green);
            padding: 12px;
            width: 100%;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: var(--terminal-green);
            color: #000;
        }

        #connection-log {
            margin-top: 20px;
            height: 100px;
            overflow-y: auto;
            font-size: 12px;
            border-top: 1px solid rgba(51, 255, 51, 0.3);
            padding-top: 10px;
        }

        /* Game UI Layout */
        #game-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            display: flex;
        }

        #canvas-container {
            flex: 1;
            position: relative;
            background: #000;
        }

        canvas { display: block; cursor: crosshair; }

        #ui-panel {
            width: 320px;
            background: var(--panel-bg);
            border-left: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .panel-section {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .panel-section h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
            list-style: none;
            margin: 0;
            font-size: 14px;
        }

        #leaderboard li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
        }

        .my-score { color: var(--accent-gold); text-shadow: 0 0 8px rgba(230, 194, 0, 0.5); }

        #action-log {
            background: rgba(0,0,0,0.3);
            font-size: 12px;
            color: #ccc;
        }

        .log-entry { margin-bottom: 6px; line-height: 1.4; border-left: 2px solid var(--border-color); padding-left: 8px; }
        .log-turn { color: #2ecc71; font-weight: bold; margin-top: 10px; }

        /* Status Badges */
        .badge {
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            background: #444;
        }
        .badge-ready { background: #27ae60; }

        .room-id-display {
            font-size: 24px;
            color: var(--accent-gold);
            text-align: center;
            font-weight: bold;
            margin: 10px 0;
            letter-spacing: 3px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); }
    </style>
</head>
<body>

<!-- Login / Peer Setup -->
<div id="login-screen">
    <div class="login-box">
        <h1>MANA CYCLE COLOSSEUM</h1>
        
        <div class="input-group">
            <label>> USERNAME</label>
            <input type="text" id="username" value="MAGE_UNIT_01" maxlength="12">
        </div>

        <div id="host-controls">
            <button id="btn-host">CREATE NEW ARENA (HOST)</button>
        </div>

        <div style="text-align: center; margin: 15px 0; opacity: 0.5;">- OR -</div>

        <div class="input-group">
            <label>> ARENA ID</label>
            <input type="text" id="room-id" placeholder="ENTER ID...">
            <button id="btn-join" style="margin-top: 10px;">JOIN ARENA (CLIENT)</button>
        </div>

        <div id="connection-log">
            <div>> SYSTEM READY.</div>
        </div>
    </div>
</div>

<!-- Main Game View -->
<div id="game-screen" style="display: none;">
    <div id="canvas-container">
        <canvas id="game-canvas"></canvas>
    </div>

    <div id="ui-panel">
        <div id="lobby-header" class="panel-section">
            <h3>Arena Standby</h3>
            <div class="room-id-display" id="display-room-id">---</div>
            <button id="btn-start-game" style="display: none; border-color: var(--accent-gold); color: var(--accent-gold);">START BATTLE</button>
            <div id="waiting-msg" style="font-size: 12px; text-align: center; margin-top: 10px; color: #888;">Waiting for Host...</div>
        </div>

        <div class="panel-section">
            <h3>Leaderboard</h3>
            <ul id="leaderboard" class="list-container"></ul>
        </div>

        <div class="panel-section" style="flex: 1; display: flex; flex-direction: column;">
            <h3>Battle Records</h3>
            <ul id="action-log" class="list-container"></ul>
        </div>
    </div>
</div>

<script>
/**
 * Game Configuration & Database
 */
const CARDS = [
    { id: 'c1', name: "Knight's Strike", type: "ATK", color: "#e74c3c", desc: "ランダムな相手から250pt奪う", 
      effect: (user, ps, logs, parts) => {
        let targets = ps.filter(p => p.id !== user.id && p.score > 0);
        if(targets.length > 0) {
            let t = targets[Math.floor(Math.random() * targets.length)];
            if(t.isDefending) {
                logs.push(`${user.name}の攻撃! しかし${t.name}のシールドが防いだ!`);
            } else {
                const amt = Math.min(t.score, 250);
                t.score -= amt; user.score += amt;
                logs.push(`${user.name}の強撃! ${t.name}から${amt}ptを強奪。`);
                parts.push({from: t.id, to: user.id, color: '#e74c3c'});
            }
        }
    }},
    { id: 'c2', name: "Holy Barrier", type: "DEF", color: "#3498db", desc: "このターンの攻撃を遮断する", 
      effect: () => {} 
    },
    { id: 'c3', name: "Mana Siphon", type: "MAG", color: "#9b59b6", desc: "全員から100ptずつ吸収する", 
      effect: (user, ps, logs, parts) => {
        let total = 0;
        ps.forEach(p => {
            if(p.id !== user.id && p.score > 0) {
                if(!p.isDefending) {
                    const amt = Math.min(p.score, 100);
                    p.score -= amt; total += amt;
                    parts.push({from: p.id, to: user.id, color: '#9b59b6'});
                }
            }
        });
        user.score += total;
        logs.push(`${user.name}の吸引! 計${total}ptを吸収した。`);
    }},
    { id: 'c4', name: "Cycle Burst", type: "ATK", color: "#f39c12", desc: "両隣から150ptずつ奪う", 
      effect: (user, ps, logs, parts) => {
        let idx = ps.findIndex(p => p.id === user.id);
        [ (idx - 1 + ps.length) % ps.length, (idx + 1) % ps.length ].forEach(tIdx => {
            let t = ps[tIdx];
            if(t && t.id !== user.id) {
                if(t.isDefending) {
                    logs.push(`${t.name}は防御した。`);
                } else {
                    const amt = Math.min(t.score, 150);
                    t.score -= amt; user.score += amt;
                    logs.push(`${user.name}のバースト! ${t.name}から${amt}pt。`);
                    parts.push({from: t.id, to: user.id, color: '#f39c12'});
                }
            }
        });
    }}
];

/**
 * P2P Connectivity Logic
 */
let peer = null;
let myId = '';
let isHost = false;
let hostConn = null;
let connections = [];
let players = [];
let battleRecords = []; 
let gamePhase = 'LOBBY'; 
let currentRound = 0;
const MAX_ROUNDS = 8;

let myHand = [];
let myState = 'IDLE'; 
let selectedCardIndex = -1;

function logCLI(msg) {
    const el = document.getElementById('connection-log');
    if(!el) return;
    const div = document.createElement('div');
    div.innerText = `> ${msg}`;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
}

function generateId() {
    return Math.random().toString(36).substr(2, 5).toUpperCase();
}

document.getElementById('btn-host').addEventListener('click', () => {
    const name = document.getElementById('username').value || 'Unknown';
    isHost = true;
    initPeer(name);
});

document.getElementById('btn-join').addEventListener('click', () => {
    const name = document.getElementById('username').value || 'Unknown';
    const roomIdInput = document.getElementById('room-id').value.toUpperCase();
    if(!roomIdInput) return logCLI("ERROR: ROOM ID REQUIRED.");
    isHost = false;
    initPeer(name, roomIdInput);
});

function initPeer(username, targetRoomId = null) {
    logCLI("INITIALIZING NETWORK...");
    peer = new Peer(generateId());

    peer.on('open', id => {
        myId = id;
        logCLI(`NODE ONLINE. ID: [${id}]`);
        
        if(isHost) {
            document.getElementById('display-room-id').innerText = id;
            document.getElementById('btn-start-game').style.display = 'block';
            document.getElementById('waiting-msg').style.display = 'none';
            players.push({id: myId, name: username, score: 1200, status: 'lobby'});
            transitionToGame();
            updateLeaderboard();
        } else {
            connectToHost(username, targetRoomId);
        }
    });

    peer.on('connection', conn => {
        if(isHost) {
            conn.on('open', () => {
                connections.push(conn);
                logCLI(`LINK ESTABLISHED: ${conn.peer}`);
                conn.on('data', data => handleIncomingData(conn, data));
                broadcastState();
            });
            conn.on('close', () => {
                players = players.filter(p => p.id !== conn.peer);
                connections = connections.filter(c => c !== conn);
                broadcastState();
                addLog(`SYSTEM: ${conn.peer} disconnected.`, true);
            });
        }
    });

    peer.on('error', err => {
        logCLI(`FATAL ERROR: ${err.type}`);
    });
}

function connectToHost(username, roomId) {
    logCLI(`LINKING TO ARENA [${roomId}]...`);
    hostConn = peer.connect(roomId);
    
    hostConn.on('open', () => {
        logCLI("CONNECTION ESTABLISHED.");
        hostConn.send({type: 'JOIN', name: username, id: myId});
        document.getElementById('display-room-id').innerText = roomId;
        document.getElementById('btn-start-game').style.display = 'none';
        document.getElementById('waiting-msg').style.display = 'block';
        transitionToGame();
    });
    
    hostConn.on('data', data => handleIncomingData(hostConn, data));
}

function handleIncomingData(conn, data) {
    if(isHost) {
        if(data.type === 'JOIN') {
            if(players.length >= 8 || gamePhase !== 'LOBBY') return;
            players.push({id: data.id, name: data.name, score: 1200, status: 'lobby'});
            addLog(`SYSTEM: ${data.name} entered the arena.`, true);
            broadcastState();
        } else if (data.type === 'ACTION') {
            // 受信した cardId から実際のカードデータを復元
            const cardObj = CARDS.find(c => c.id === data.cardId);
            processPlayerAction(data.id, cardObj);
        }
    } else {
        if(data.type === 'STATE_SYNC') {
            players = data.players;
            gamePhase = data.phase;
            currentRound = data.round;
            
            if(data.records) {
                syncActionLogs(data.records);
            }

            if(gamePhase === 'PLAYING') {
                document.getElementById('lobby-header').style.display = 'none';
            }
            updateLeaderboard();
        } else if (data.type === 'ROUND_START') {
            // IDリストからカードオブジェクトを復元
            myHand = data.handIds.map(id => CARDS.find(c => c.id === id));
            myState = 'SELECTING';
            selectedCardIndex = -1;
            document.getElementById('lobby-header').style.display = 'none';
        } else if (data.type === 'ROUND_RESOLVE') {
            players = data.players;
            triggerEffects(data.effects);
            updateLeaderboard();
        }
    }
}

function broadcastState() {
    const msg = {
        type: 'STATE_SYNC',
        players: players.map(p => ({id: p.id, name: p.name, score: p.score, status: p.status})),
        phase: gamePhase,
        round: currentRound,
        records: battleRecords
    };
    connections.forEach(c => {
        if(c.open) c.send(msg);
    });
    updateLeaderboard();
}

/**
 * Game Flow Logic
 */
document.getElementById('btn-start-game').addEventListener('click', () => {
    if(!isHost || players.length < 1) return;
    addLog("SYSTEM: BATTLE INITIATED.", true);
    startNewRound();
});

function startNewRound() {
    currentRound++;
    gamePhase = 'PLAYING';
    document.getElementById('lobby-header').style.display = 'none';
    
    addLog(`<div class="log-turn">--- ROUND ${currentRound} START ---</div>`, true);

    players.forEach(p => {
        p.status = 'thinking';
        p.chosenCard = null;
        
        // カードオブジェクトそのものではなく ID の配列を作成
        const handIds = Array.from({length: 4}, () => CARDS[Math.floor(Math.random() * CARDS.length)].id);
        
        if(p.id === myId) {
            myHand = handIds.map(id => CARDS.find(c => c.id === id));
            myState = 'SELECTING';
            selectedCardIndex = -1;
        } else {
            const targetConn = connections.find(conn => conn.peer === p.id);
            if(targetConn && targetConn.open) {
                // 関数を含まない ID 配列のみを送信
                targetConn.send({
                    type: 'ROUND_START', 
                    handIds: handIds, 
                    round: currentRound
                });
            }
        }
    });
    
    broadcastState();
}

function processPlayerAction(pid, card) {
    let p = players.find(p => p.id === pid);
    if(p && p.status === 'thinking') {
        p.status = 'ready';
        p.chosenCard = card;
        broadcastState();
        
        if(players.every(pl => pl.status === 'ready')) {
            setTimeout(resolveBattle, 500);
        }
    }
}

function resolveBattle() {
    gamePhase = 'RESOLVING';
    myState = 'IDLE';
    let logs = [];
    let effects = [];

    players.forEach(p => {
        p.isDefending = (p.chosenCard && p.chosenCard.type === 'DEF');
        if(p.isDefending) {
            logs.push(`🛡️ ${p.name} がシールドを展開。`);
            effects.push({from: p.id, to: p.id, type: 'shield', color: '#00ffff'});
        }
    });

    players.forEach(p => {
        if(p.chosenCard && p.chosenCard.type !== 'DEF') {
            const cardRef = CARDS.find(c => c.id === p.chosenCard.id);
            if(cardRef) cardRef.effect(p, players, logs, effects);
        }
    });

    logs.forEach(l => addLog(l, true));

    const resolveMsg = {
        type: 'ROUND_RESOLVE',
        players: players.map(p => ({id: p.id, name: p.name, score: p.score})),
        effects
    };
    
    connections.forEach(c => { if(c.open) c.send(resolveMsg); });
    
    triggerEffects(effects);
    broadcastState();

    setTimeout(() => {
        if(currentRound >= MAX_ROUNDS) {
            gamePhase = 'END';
            addLog("SYSTEM: BATTLE CONCLUDED.", true);
            broadcastState();
        } else {
            startNewRound();
        }
    }, 4000);
}

/**
 * UI & Graphics
 */
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let activeParticles = [];
let playerNodes = {};

function transitionToGame() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    requestAnimationFrame(renderLoop);
}

function resizeCanvas() {
    const container = document.getElementById('canvas-container');
    if(!container) return;
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
}

function updateLeaderboard() {
    const list = document.getElementById('leaderboard');
    if(!list) return;
    list.innerHTML = '';
    [...players].sort((a,b) => b.score - a.score).forEach((p, i) => {
        const li = document.createElement('li');
        if(p.id === myId) li.className = 'my-score';
        const readyIcon = p.status === 'ready' ? '<span class="badge badge-ready">READY</span>' : '';
        li.innerHTML = `<span>${i+1}. ${p.name}</span> <span>${p.score}pt ${readyIcon}</span>`;
        list.appendChild(li);
    });
}

function addLog(msg, isBroadcasting = false) {
    if(isBroadcasting) {
        battleRecords.push(msg);
        if(battleRecords.length > 50) battleRecords.shift();
    }
    
    const list = document.getElementById('action-log');
    if(!list) return;
    const li = document.createElement('div');
    li.className = 'log-entry';
    li.innerHTML = msg;
    list.appendChild(li);
    list.scrollTop = list.scrollHeight;
}

function syncActionLogs(records) {
    const list = document.getElementById('action-log');
    if(!list) return;
    list.innerHTML = ''; 
    records.forEach(msg => {
        const li = document.createElement('div');
        li.className = 'log-entry';
        li.innerHTML = msg;
        list.appendChild(li);
    });
    list.scrollTop = list.scrollHeight;
}

function triggerEffects(effs) {
    effs.forEach(e => {
        activeParticles.push({
            fromId: e.from,
            toId: e.to,
            color: e.color,
            type: e.type || 'bolt',
            progress: 0,
            speed: 0.02 + Math.random() * 0.01
        });
    });
}

function renderLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const cx = canvas.width / 2;
    const cy = canvas.height / 2 - 40;
    const radius = Math.min(cx, cy) * 0.7;

    ctx.strokeStyle = 'rgba(92, 64, 51, 0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI*2); ctx.stroke();

    playerNodes = {};
    players.forEach((p, i) => {
        const angle = (i / players.length) * Math.PI * 2 - Math.PI / 2;
        const px = cx + Math.cos(angle) * radius;
        const py = cy + Math.sin(angle) * radius;
        playerNodes[p.id] = {x: px, y: py};

        ctx.fillStyle = p.id === myId ? '#3498db' : (p.status === 'ready' ? '#2ecc71' : '#5c4033');
        ctx.shadowBlur = p.status === 'ready' ? 15 : 0;
        ctx.shadowColor = ctx.fillStyle;
        
        ctx.beginPath();
        ctx.moveTo(px, py - 15); ctx.lineTo(px + 15, py); 
        ctx.lineTo(px, py + 15); ctx.lineTo(px - 15, py);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(p.name, px, py - 25);
        ctx.fillStyle = varColor('--accent-gold');
        ctx.fillText(`${p.score}pt`, px, py + 30);
    });

    activeParticles = activeParticles.filter(p => {
        const start = playerNodes[p.fromId];
        const end = playerNodes[p.toId];
        if(!start || !end) return false;

        p.progress += p.speed;
        if(p.progress >= 1) return false;

        const curX = start.x + (end.x - start.x) * p.progress;
        const curY = start.y + (end.y - start.y) * p.progress;

        if(p.type === 'shield') {
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(start.x, start.y, 25 + Math.sin(p.progress * 10) * 5, 0, Math.PI*2);
            ctx.globalAlpha = 1 - p.progress;
            ctx.stroke();
            ctx.globalAlpha = 1.0;
        } else {
            ctx.fillStyle = p.color;
            ctx.shadowBlur = 10; ctx.shadowColor = p.color;
            ctx.beginPath(); ctx.arc(curX, curY, 5, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
        }
        return true;
    });

    if(gamePhase === 'PLAYING' && myState === 'SELECTING') {
        renderHand();
    } else if (myState === 'WAITING') {
        ctx.fillStyle = '#fff';
        ctx.font = '20px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText("TRANSMITTING ACTION...", cx, canvas.height - 100);
    }

    if(gamePhase === 'END') {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = varColor('--accent-gold');
        ctx.font = 'bold 40px Arial';
        ctx.textAlign = 'center';
        ctx.fillText("BATTLE CONCLUDED", cx, cy);
    }

    requestAnimationFrame(renderLoop);
}

function renderHand() {
    const cardW = 120;
    const cardH = 160;
    const totalW = myHand.length * (cardW + 15);
    const startX = (canvas.width - totalW) / 2;
    const y = canvas.height - cardH - 30;

    myHand.forEach((card, i) => {
        if(!card) return;
        const x = startX + i * (cardW + 15);
        const isHover = mouseX >= x && mouseX <= x+cardW && mouseY >= y && mouseY <= y+cardH;
        const isSelected = selectedCardIndex === i;

        ctx.fillStyle = isSelected ? '#331a00' : '#1a0d00';
        ctx.strokeStyle = isSelected ? varColor('--accent-gold') : card.color;
        ctx.lineWidth = isSelected ? 4 : 2;

        const drawY = isHover || isSelected ? y - 15 : y;
        
        ctx.fillRect(x, drawY, cardW, cardH);
        ctx.strokeRect(x, drawY, cardW, cardH);

        ctx.fillStyle = card.color;
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(`[${card.type}]`, x + cardW/2, drawY + 25);
        
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 13px Arial';
        drawText(card.name, x + cardW/2, drawY + 55, cardW - 10);
        
        ctx.font = '10px Arial';
        ctx.fillStyle = '#aaa';
        drawText(card.desc, x + cardW/2, drawY + 90, cardW - 10);

        if(isSelected) {
            ctx.fillStyle = varColor('--accent-gold');
            ctx.fillRect(x, drawY + cardH + 5, cardW, 25);
            ctx.fillStyle = '#000';
            ctx.font = 'bold 12px Arial';
            ctx.fillText("CAST SPELL", x + cardW/2, drawY + cardH + 22);
        }
    });
}

function drawText(text, x, y, max) {
    const words = text.split('');
    let line = '';
    let currY = y;
    for(let n=0; n<words.length; n++) {
        let test = line + words[n];
        if(ctx.measureText(test).width > max) {
            ctx.fillText(line, x, currY);
            line = words[n];
            currY += 14;
        } else {
            line = test;
        }
    }
    ctx.fillText(line, x, currY);
}

function varColor(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

let mouseX = 0, mouseY = 0;
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
});

canvas.addEventListener('mousedown', e => {
    if(gamePhase !== 'PLAYING' || myState !== 'SELECTING') return;

    const cardW = 120;
    const cardH = 160;
    const totalW = myHand.length * (cardW + 15);
    const startX = (canvas.width - totalW) / 2;
    const y = canvas.height - cardH - 30;

    myHand.forEach((_, i) => {
        const x = startX + i * (cardW + 15);
        if(mouseX >= x && mouseX <= x+cardW && mouseY >= y && mouseY <= y+cardH) {
            selectedCardIndex = i;
        }
        if(selectedCardIndex === i && mouseX >= x && mouseX <= x+cardW && mouseY >= y+cardH+5 && mouseY <= y+cardH+30) {
            confirmAction();
        }
    });
});

function confirmAction() {
    if(selectedCardIndex === -1) return;
    const card = myHand[selectedCardIndex];
    myState = 'WAITING';
    if(isHost) {
        processPlayerAction(myId, card);
    } else {
        if(hostConn && hostConn.open) {
            // ここでも cardId のみを送信
            hostConn.send({type: 'ACTION', id: myId, cardId: card.id});
        }
    }
}
</script>
